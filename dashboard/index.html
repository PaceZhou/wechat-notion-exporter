<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信文章收集系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📎 微信文章收集系统</h1>
      <p>跨设备自动化处理控制面板</p>
    </div>
    
    <div class="card">
      <h2>系统状态</h2>
      <small style="color: #666; display: block; margin-bottom: 15px;">
        🟢 绿色=运行中 | 🔵 蓝色=处理中 | 🔴 红色=异常
      </small>
      <div class="status-grid">
        <div class="status-item">
          <div class="status-value" id="serverStatus">●</div>
          <div class="status-label">服务器状态</div>
        </div>
        <div class="status-item">
          <div class="status-value" id="pendingCount">0</div>
          <div class="status-label">待处理</div>
        </div>
        <div class="status-item">
          <div class="status-value" id="processedCount">0</div>
          <div class="status-label">已完成</div>
        </div>
        <div class="status-item">
          <div class="status-value" id="localVersion" style="font-size: 32px;">-</div>
          <div class="status-label">当前版本</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <h2>快速操作</h2>
      <div class="btn-group">
        <button class="btn-primary" onclick="startServer()">🚀 启动服务器</button>
        <button class="btn-danger" onclick="stopServer()">⏹ 停止服务器</button>
        <button class="btn-secondary" onclick="runDaily()">▶️ 立即处理</button>
        <button class="btn-secondary" onclick="toggleConfig()">⚙️ 配置</button>
      </div>
    </div>

    
    <div class="card" id="configPanel" style="display:none;">
      <h2>系统配置</h2>
      
      <h3>📝 Notion 配置</h3>
      <label>Notion API Key:</label>
      <input type="password" id="notionApiKey" placeholder="ntn_...">
      <small style="color: #666;">
        获取方式：访问 <a href="https://www.notion.so/my-integrations" target="_blank">https://www.notion.so/my-integrations</a> 
        → 创建 Integration → 复制 API Key
      </small>
      
      <label>收集箱数据库 ID:</label>
      <input type="text" id="collectionDbId" placeholder="从 Notion 复制数据库 ID">
      <small style="color: #666;">
        获取方式：在 Notion 中打开数据库（全屏视图）→ 复制浏览器地址栏中的 32 位字符
      </small>
      
      <label>目标数据库 ID（存放文章）:</label>
      <input type="text" id="targetDbId" placeholder="从 Notion 复制数据库 ID">
      <small style="color: #666;">同上方式获取</small>
      
      <h3>🖥️ 服务器配置</h3>
      <label>服务器端口:</label>
      <input type="number" id="serverPort" value="3000">
      
      <label>本机 IP（供 Chrome 扩展连接）:</label>
      <input type="text" id="serverAddress" placeholder="如: 192.168.1.100">
      
      <button class="btn-secondary" onclick="autoConfigCollectionDb()">⚙️ 自动配置数据库结构</button>
      <button class="btn-secondary" onclick="testNotionConnection()">🔗 测试连接</button>
      <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
    
    <div class="card">
      <h2>实时日志</h2>
      <div class="log" id="logPanel">系统就绪...</div>
    </div>
  </div>
  
  <script src="dashboard.js"></script>
</body>
</html>
    
    <div class="card">
      <h2>系统版本</h2>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div>当前版本: <span id="localVersion">加载中...</span></div>
          <div id="updateInfo" style="margin-top: 10px;"></div>
        </div>
        <button class="btn-secondary" onclick="checkUpdate()">🔄 检查更新</button>
      </div>
    </div>
