<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信文章收集系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📎 微信文章收集系统</h1>
      <p>跨设备自动化处理控制面板</p>
    </div>
    
    <div class="card">
      <h2>系统状态</h2>
      <div class="status-grid">
        <div class="status-item">
          <div class="status-value" id="serverStatus">●</div>
          <div class="status-label">服务器状态</div>
        </div>
        <div class="status-item">
          <div class="status-value" id="pendingCount">0</div>
          <div class="status-label">待处理</div>
        </div>
        <div class="status-item">
          <div class="status-value" id="processedCount">0</div>
          <div class="status-label">已完成</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <h2>快速操作</h2>
      <div class="btn-group">
        <button class="btn-primary" onclick="startServer()">🚀 启动服务器</button>
        <button class="btn-danger" onclick="stopServer()">⏹ 停止服务器</button>
        <button class="btn-secondary" onclick="runDaily()">▶️ 立即处理</button>
        <button class="btn-secondary" onclick="toggleConfig()">⚙️ 配置</button>
      </div>
    </div>

    
    <div class="card" id="configPanel" style="display:none;">
      <h2>系统配置</h2>
      
      <h3>📝 Notion 配置</h3>
      <label>Notion API Key:</label>
      <input type="password" id="notionApiKey" placeholder="ntn_...">
      
      <label>目标数据库 ID（存放文章）:</label>
      <input type="text" id="targetDbId" placeholder="从 Notion 复制数据库 ID">
      <small>填入后点击"自动创建收集箱"，程序会自动创建收集箱数据库</small>
      
      <label>收集箱数据库 ID:</label>
      <input type="text" id="collectionDbId" placeholder="自动创建后显示" readonly>
      
      <h3>🖥️ 服务器配置</h3>
      <label>服务器端口:</label>
      <input type="number" id="serverPort" value="3000">
      
      <label>本机 IP（供 Chrome 扩展连接）:</label>
      <input type="text" id="serverAddress" placeholder="如: 192.168.1.100">
      
      <button class="btn-secondary" onclick="autoCreateCollectionDb()">🗄️ 自动创建收集箱</button>
      <button class="btn-secondary" onclick="testNotionConnection()">🔗 测试连接</button>
      <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
    
    <div class="card">
      <h2>实时日志</h2>
      <div class="log" id="logPanel">系统就绪...</div>
    </div>
  </div>
  
  <script src="dashboard.js"></script>
</body>
</html>
